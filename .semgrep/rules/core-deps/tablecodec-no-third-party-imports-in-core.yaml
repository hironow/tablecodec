rules:
  - id: tablecodec-no-third-party-imports-in-core
    message: |
      Core modules must not depend on third-party packages.
      See SPEC.md §13 (Dependency Policy) and intent.md §6 (Anti-patterns).
      Allowed: Python stdlib only.
    severity: ERROR
    languages: [python]
    pattern-regex: '^\s*(import\s+(pydantic|numpy|PIL|cv2|pandas|click|orjson|lxml|apted)(\s|\.|\s*$)|from\s+(pydantic|numpy|PIL|cv2|pandas|click|orjson|lxml|apted)(\s|\.))'
    paths:
      include:
        - /src/tablecodec/__init__.py
        - /src/tablecodec/ir.py
        - /src/tablecodec/_invariants.py
        - /src/tablecodec/validate.py
        - /src/tablecodec/io.py
        - /src/tablecodec/loss.py
        - /src/tablecodec/codecs/_base.py
        - /src/tablecodec/codecs/__init__.py
        - /src/tablecodec/codecs/builtins.py
        - /src/tablecodec/codecs/_htmltable.py
        - /src/tablecodec/codecs/_otslgrid.py
        - /src/tablecodec/codecs/pubtabnet.py
        - /src/tablecodec/codecs/otsl.py
        - /src/tablecodec/codecs/fintabnet.py
        - /src/tablecodec/codecs/fintabnet_otsl.py
        - /src/tablecodec/codecs/tableformer.py
        - /src/tablecodec/codecs/doctags.py
        - /src/tablecodec/codecs/pubtables1m.py
        - /src/tablecodec/codecs/tablebank.py
    metadata:
      category: core-deps
