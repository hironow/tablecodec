# Release: OIDC Trusted Publishing, no long-lived publish tokens (ADR 0014).
#
# Trigger: pushing a `v*` tag. Build + provenance run to completion BEFORE the
# publish job, so a publish is only ever attempted on fully-built, attested
# artifacts (build -> provenance -> publish -> github-release).
#
# Publish auth is OIDC only:
#   - PyPI: pypa/gh-action-pypi-publish uploads via Trusted Publishing and emits
#     PEP 740 publish attestations automatically (verified on PyPI). No
#     long-lived API token is stored as a secret.
# Additively, actions/attest-build-provenance produces a GitHub SLSA build
# provenance for the distributions (a SEPARATE artifact, verified with
# `gh attestation verify` -- NOT the PyPI PEP 740 attestation).
#
# Security notes:
#   - No attacker-controlled github.event.{issue,pull_request,comment,review,
#     commits,head_commit}.* field is interpolated anywhere; the only GitHub
#     context in a run: step is github.ref, passed via env (GIT_REF) and quoted.
#   - Every action is pinned to a full commit SHA (repo policy: sha_pinning_required).
#   - The PyPI trusted-publisher binding must match this workflow EXACTLY:
#     repo hironow/tablecodec, workflow filename release.yaml, environment release.

name: Release

on:
  push:
    tags:
      - "v*"

# Read-only by default; the publish jobs elevate to id-token: write per job.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  # Never cancel a release run mid-publish.
  cancel-in-progress: false

jobs:
  build:
    name: build sdist + wheel
    if: github.repository == 'hironow/tablecodec'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "0.11.17"

      # Route the build-backend (hatchling) resolution through Takumi Guard
      # (blocks known-malicious packages before they execute; sets
      # UV_INDEX_URL/PIP_INDEX_URL to the screened registry for this job).
      # Blocking-only mode, no account needed. Must precede `uv build` so the
      # published artifact is built only from screened build dependencies.
      - name: Route installs through Takumi Guard
        uses: flatt-security/setup-takumi-guard-pypi@733047c120b6377fa05fb77f714df8d8cd3a41a9 # v1.0.1

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Build distributions
        run: uv build

      - name: Verify built version matches the tag
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          tag_version="${GIT_REF#refs/tags/v}"
          built=$(ls dist/*.whl | sed -E 's/.*tablecodec-([0-9.]+)-.*/\1/')
          echo "tag=$tag_version built=$built"
          test "$tag_version" = "$built"

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  provenance:
    name: SLSA build provenance (GitHub artifact attestation)
    needs: build
    if: github.repository == 'hironow/tablecodec'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      # GitHub SLSA build provenance for the wheels/sdist. This is a DIFFERENT
      # artifact from the PyPI PEP 740 attestation (verified with
      # `gh attestation verify`, not on PyPI). Kept separate on purpose.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"

  publish:
    name: publish to PyPI (trusted publishing)
    needs: provenance
    if: github.repository == 'hironow/tablecodec'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/tablecodec
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          # Idempotent re-runs: if a prior attempt uploaded some files before
          # failing, skip the ones already on PyPI instead of colliding. PyPI
          # never allows overwriting an existing file, so this is the safe retry.
          skip-existing: true
          # PEP 740 attestations are generated automatically (default since v1.11).

  github-release:
    name: create GitHub Release
    needs: publish
    if: github.repository == 'hironow/tablecodec'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.ref }}
        run: |
          tag="${GIT_REF#refs/tags/}"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes "See CHANGELOG.md for details." \
            dist/*
