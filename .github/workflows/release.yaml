# Release workflow.
#
# Security review (per GitHub Actions injection guide):
#   - Triggered only by maintainer-pushed version tags (refs/tags/v*).
#   - The only GitHub context referenced in any run: step is github.ref,
#     passed through an env var (GIT_REF) and shell-quoted before use.
#   - No attacker-controlled github.event.{issue,pull_request,comment,
#     review,commits,head_commit}.* fields are interpolated anywhere.
#   - Publishing uses PyPI Trusted Publishing (OIDC); no long-lived API
#     token is stored as a secret.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Build distributions
        run: uv build

      - name: Verify built version matches the tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          tag_version="${GIT_REF#refs/tags/v}"
          built=$(ls dist/*.whl | sed -E 's/.*tablecodec-([0-9.]+)-.*/\1/')
          echo "tag=$tag_version built=$built"
          test "$tag_version" = "$built"

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a real tag push, never on a workflow_dispatch dry run.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/tablecodec
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # required to create a release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.ref }}
        run: |
          tag="${GIT_REF#refs/tags/}"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes "See CHANGELOG.md for details." \
            dist/*
