name: CI

# Note: matrix.* and github.ref/github.workflow are trusted, non-attacker-controlled.
# No usage of github.event.{issue,pull_request,comment,review}.* in any run: step.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        env:
          PY_VERSION: ${{ matrix.python-version }}
        run: uv python install "$PY_VERSION"

      - name: Install project (dev extras)
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff check + format)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check (pyright strict)
        run: pyright src/ tests/

      - name: Unit tests (pytest)
        run: pytest tests/ -v

  semgrep:
    name: semgrep (core no-3rd-party)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run semgrep meta-rules
        uses: semgrep/semgrep-action@v1
        with:
          config: semgrep.yaml

  pip-install-check:
    name: pip install -e .
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (no extras) — verifies core stays stdlib-only at import time
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -c "import tablecodec; print(tablecodec.__version__)"
