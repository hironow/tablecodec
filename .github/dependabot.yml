# Dependabot version updates (first-party; no third-party app with repo write
# access). Dependabot security updates are enabled separately in the repo's
# security settings.
#
# Supply-chain hardening: a 7-day `cooldown` holds back every routine bump until
# the new version has been public for a week, so a compromised-then-yanked
# release is not pulled in on day zero. Cooldown applies to version updates only
# -- Dependabot SECURITY updates (vulnerability fixes) bypass it and still land
# fast.
#
# NOTE on the uv ecosystem: pyproject.toml pins `[tool.uv] exclude-newer` to an
# absolute date. A Dependabot uv PR cannot resolve distributions newer than that
# cutoff, so when merging one, bump `exclude-newer` to that day's date and
# re-run `uv lock` in the same change (see ADR 0014 / the release runbook).
#
# Ecosystems in this repo:
#   github-actions  -> .github/workflows/*.yaml (SHA-pinned actions)
#   uv              -> pyproject.toml + uv.lock (dev/cli/teds/hf extras only;
#                      the runtime core is zero-dependency)
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore"
      include: "scope"
