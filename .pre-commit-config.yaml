# prek (j178/prek) -- Rust reimplementation of pre-commit. See ~/dotfiles.
# Install: just hooks        (mise exec -- prek install -t pre-commit -t pre-push)
# Run all: just pre-commit   (mise exec -- prek run --all-files)
minimum_prek_version: "0.4.0"

repos:
  # Rust-native builtin hooks (fast, no external repo clone).
  - repo: builtin
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: local
    hooks:
      # ruff/ruff-format run via the project's own ruff (uv), so the hook
      # version never drifts from `just lint`/`just fmt`. Scoped to src/+tests/
      # to match `just lint` (scripts/ is ungated; packages/ has its own gate).
      - id: ruff
        name: ruff (check --fix)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types: [python]
        files: ^(src|tests|scripts)/
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types: [python]
        files: ^(src|tests|scripts)/

      # markdownlint via the mise-pinned cli2 so the hook matches `just fmt`.
      # Immutable ADRs, generated tables, corpus, and data dirs are excluded
      # (kept in sync with .markdownlint-cli2.yaml ignores, which only apply
      # to glob expansion).
      - id: markdownlint
        name: markdownlint-cli2 (--fix)
        entry: mise exec -- markdownlint-cli2 --fix
        language: system
        files: '\.md$'
        exclude: '^(docs/adr/|docs/(format_support|loss_matrix)\.md$|conformance/|input/|output/|private/)'

      - id: pyright
        name: pyright (strict)
        entry: uv run --extra teds pyright src/ tests/
        language: system
        types: [python]
        pass_filenames: false

      - id: semgrep
        name: semgrep (core no-3rd-party)
        entry: semgrep --config .semgrep/rules/ --error src/
        language: system
        types: [python]
        pass_filenames: false

      - id: semgrep-test
        name: semgrep test (rule correctness)
        entry: semgrep test .semgrep/rules/
        language: system
        files: ^\.semgrep/
        pass_filenames: false

  # pre-push: the full pre-merge gate (just check == just ci).
  - repo: local
    hooks:
      - id: just-check
        name: just check (full gate)
        entry: just check
        language: system
        pass_filenames: false
        stages: [pre-push]
        description: Full pre-merge gate (lint, type, test, semgrep, semgrep-test, docs-check).
