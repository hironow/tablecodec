repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: local
    hooks:
      # ruff/ruff-format run via the project's own ruff (uv), so the hook
      # version never drifts from `just lint`/`just fmt`. Scoped to src/+tests/
      # to match `just lint` (scripts/ is ungated; packages/ has its own gate).
      - id: ruff
        name: ruff (check --fix)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types: [python]
        files: ^(src|tests|scripts)/
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types: [python]
        files: ^(src|tests|scripts)/

      - id: pyright
        name: pyright (strict)
        entry: uv run --extra teds pyright src/ tests/
        language: system
        types: [python]
        pass_filenames: false

      - id: semgrep
        name: semgrep (core no-3rd-party)
        entry: semgrep --config .semgrep/rules/ --error src/
        language: system
        types: [python]
        pass_filenames: false

      - id: semgrep-test
        name: semgrep test (rule correctness)
        entry: semgrep test .semgrep/rules/
        language: system
        files: ^\.semgrep/
        pass_filenames: false
